steps:
  # Step 1: Install required Python dependencies for compilation
  - name: 'python:3.9'
    entrypoint: 'pip'
    args: ['install', 'kfp', 'google-cloud-pipeline-components', 'google-cloud-aiplatform']

  # Step 2: Run the submission script
  - name: 'python:3.9'
    entrypoint: 'python'
    args: ['run_pipeline.py']
    env:
      - 'PROJECT_ID=$PROJECT_ID'
      - 'REGION=us-central1'
      - 'BUCKET_NAME=${PROJECT_ID}-vertex-pipelines'

options:
  logging: CLOUD_LOGGING_ONLY